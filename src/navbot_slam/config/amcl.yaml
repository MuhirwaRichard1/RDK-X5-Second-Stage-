# nav2_amcl — particle-filter localization against a saved map, used by
# NAVIGATE (autonav.launch.py -> amcl_localization.launch.py).
#
# Why AMCL and not slam_toolbox localization: slam_toolbox only scan-matches
# LOCALLY from an assumed start pose. With no map_start_pose it silently
# assumes the robot sits at the map origin and publishes an identity map->odom
# — so unless you park the robot exactly where mapping began, the pose is wrong
# and never recovers. AMCL can globally localize: scatter particles over the
# whole map and let them converge as the robot turns (goal_navigator calls
# /reinitialize_global_localization on startup and spins until convergence).
#
# icp_odometry still owns odom->base_link; amcl owns map->odom.
amcl:
  ros__parameters:
    use_sim_time: false

    # frames / topics — match the rest of the stack
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: /scan
    tf_broadcast: true
    # icp odom + a 15 Hz navigator: keep this comfortably above one cycle.
    transform_tolerance: 0.5

    # motion model — differential drive. alphas are odom noise; icp_odometry is
    # a good deal better than dead-reckoning, so these stay modest.
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2        # rot noise from rot
    alpha2: 0.2        # rot noise from trans
    alpha3: 0.2        # trans noise from trans
    alpha4: 0.2        # trans noise from rot
    alpha5: 0.2        # strafe (unused, differential)

    # particle cloud. The arena is a small room (~7 m across) so a global
    # scatter does not need a huge population to cover it — and a big cloud is
    # suspected in the rmw "cannot publish data" failures on /cmd_vel that
    # appear only once amcl joins the graph, so keep this lean.
    min_particles: 200
    max_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    # random-particle injection — this is what recovers from a kidnap, and
    # what lets a bad global hypothesis be replaced rather than locked in.
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # update only after real motion, otherwise the filter over-converges while
    # standing still (and the startup spin is what feeds it).
    update_min_d: 0.1        # m
    update_min_a: 0.15       # rad
    resample_interval: 1
    save_pose_rate: 0.5

    # sensor model — RPLidar C1, same range limits as the SLAM configs
    laser_model_type: "likelihood_field"
    laser_min_range: 0.15
    laser_max_range: 12.0
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.5
    z_rand: 0.5
    z_max: 0.05
    z_short: 0.05
    lambda_short: 0.1
    do_beamskip: false

    # no seeded pose: NAVIGATE starts by globally localizing instead. Leaving
    # always_reset_initial_pose false lets an operator-supplied /initialpose
    # (or a converged pose) survive rather than being stomped on activation.
    set_initial_pose: false
    always_reset_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    # yaml_filename is injected by amcl_localization.launch.py from map_file:=
    topic_name: "map"
    frame_id: "map"
