# slam_toolbox in LOCALIZATION mode — loads a saved pose-graph and relocalizes
# the robot against it (continuous scan-matching → map->odom). This is also the
# kidnap-recovery relocalizer: after a lift-and-move, scan matching re-converges
# on the loaded map. Started by lidar_slam.launch.py when slam_mode:=localization
# (which also injects `map_file_name` from the map_file launch arg).
#
# icp_odometry still supplies odom->base_link (the local motion); slam_toolbox
# supplies map->odom (the global correction against the saved map). Same C1 scan
# + solver tuning as slam_toolbox.yaml so match quality is identical.
slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization             # <-- load + relocalize (not build)
    # map_file_name is injected by lidar_slam.launch.py from map_file:=<base>.
    # No map_start_pose/dock: localization begins at the map origin and
    # re-converges as the robot drives (this is also the kidnap recovery).

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 2.0
    min_laser_range: 0.15
    max_laser_range: 12.0
    resolution: 0.05
    minimum_time_interval: 0.5
    transform_timeout: 0.2
    tf_buffer_duration: 30.
    stack_size_to_use: 40000000
    enable_interactive_mode: false

    # General Parameters (match slam_toolbox.yaml)
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.25
    minimum_travel_heading: 0.25
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    min_pass_through: 2
    occupancy_threshold: 0.1
